<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pocket TTS Engine</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 320px;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #f8f9fa;
      padding: 16px;
      color: #1a1a2e;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .header h3 {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-badge {
      font-size: 10px;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-badge.ready {
      background: #e6f7e6;
      color: #1e7e34;
    }
    .status-badge.loading {
      background: #fff3cd;
      color: #856404;
    }
    .status-badge.error {
      background: #f8d7da;
      color: #721c24;
    }
    .divider {
      height: 1px;
      background: #e8eaed;
      margin: 10px 0;
    }
    .voice-selector {
      margin: 8px 0 12px;
    }
    .voice-selector label {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }
    .voice-selector select {
      width: 100%;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 13px;
      background: white;
      cursor: pointer;
    }
    .voice-selector select:focus {
      outline: none;
      border-color: #4a6cf7;
    }
    .btn-group {
      display: flex;
      gap: 8px;
      margin: 12px 0 8px;
    }
    .btn {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #4a6cf7;
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      background: #3a5cd9;
    }
    .btn-danger {
      background: #dc3545;
      color: white;
    }
    .btn-danger:hover:not(:disabled) {
      background: #c82333;
    }
    .btn-secondary {
      background: #e8eaed;
      color: #333;
    }
    .btn-secondary:hover:not(:disabled) {
      background: #d5d8dd;
    }
    .btn-success {
      background: #28a745;
      color: white;
    }
    .btn-success:hover:not(:disabled) {
      background: #1e7e34;
    }
    .btn-sm {
      padding: 6px 12px;
      font-size: 11px;
      flex: 0 0 auto;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
      padding: 4px 0;
    }
    .status-row .label {
      font-weight: 500;
    }
    .status-row .value {
      font-family: monospace;
      font-size: 11px;
      color: #1a1a2e;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.green { background: #28a745; }
    .status-dot.yellow { background: #ffc107; }
    .status-dot.red { background: #dc3545; }

    .log-area {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Consolas', monospace;
      font-size: 10px;
      padding: 10px;
      border-radius: 6px;
      max-height: 100px;
      overflow-y: auto;
      margin-top: 10px;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.4;
    }
    .log-area .log-error { color: #f8a5b0; }
    .log-area .log-success { color: #8bc34a; }
    .log-area .log-info { color: #80d4ff; }

    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 10px;
      color: #999;
    }
    .footer a {
      color: #4a6cf7;
      text-decoration: none;
      cursor: pointer;
    }
    .footer a:hover {
      text-decoration: underline;
    }

    .quick-test {
      display: flex;
      gap: 6px;
      margin: 8px 0 4px;
      flex-wrap: wrap;
    }
    .quick-test .btn {
      flex: 0 0 auto;
      padding: 4px 12px;
      font-size: 11px;
    }
    .accordion {
      border: 1px solid #e8eaed;
      border-radius: 8px;
      background: white;
      margin-top: 10px;
      overflow: hidden;
    }
    .accordion summary {
      list-style: none;
      cursor: pointer;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      color: #1a1a2e;
      user-select: none;
    }
    .accordion summary::-webkit-details-marker {
      display: none;
    }
    .accordion summary::after {
      content: '+';
      float: right;
      color: #666;
    }
    .accordion[open] summary::after {
      content: '-';
    }
    .accordion-body {
      padding: 0 12px 12px;
    }
    .accordion-body input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      margin-bottom: 8px;
    }
    .accordion-body input:focus {
      outline: none;
      border-color: #4a6cf7;
    }
    .accordion-help {
      font-size: 10px;
      color: #666;
      line-height: 1.4;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h3>🎯 Pocket TTS</h3>
    <span id="statusBadge" class="status-badge loading">Loading</span>
  </div>

  <div class="status-row">
    <span class="label"><span id="statusDot" class="status-dot yellow"></span>Server</span>
    <span class="value" id="serverStatus">Checking...</span>
  </div>

  <div class="divider"></div>

  <div class="voice-selector">
    <label for="voiceSelect">🎤 Voice</label>
    <select id="voiceSelect">
      <option value="Pocket US Female">Pocket US Female</option>
      <option value="Pocket US Male">Pocket US Male</option>
      <option value="Pocket UK Female">Pocket UK Female</option>
    </select>
  </div>

  <div class="btn-group">
    <button id="speakBtn" class="btn btn-primary">🔊 Speak</button>
    <button id="stopBtn" class="btn btn-danger">⏹ Stop</button>
  </div>

  <div class="quick-test">
    <button class="btn btn-secondary btn-sm" data-text="Hello, this is a test.">Hello</button>
    <button class="btn btn-secondary btn-sm" data-text="The quick brown fox jumps over the lazy dog.">Fox</button>
    <button class="btn btn-secondary btn-sm" data-text="Testing Pocket TTS engine with different phrases.">Testing</button>
  </div>

  <div class="divider"></div>

  <div class="btn-group">
    <button id="refreshBtn" class="btn btn-secondary btn-sm">🔄 Refresh</button>
    <button id="optionsBtn" class="btn btn-secondary btn-sm">Panel</button>
    <button id="clearLogBtn" class="btn btn-secondary btn-sm">🗑 Clear</button>
  </div>

  <details class="accordion">
    <summary>Add Installer Extension ID</summary>
    <div class="accordion-body">
      <input id="bridgeExtensionIdInput" type="text" placeholder="hijmjnmdgkcjlnhoimfnhkgkdaaeeaha or chrome-extension://.../">
      <div class="accordion-help">
        Paste the raw extension ID or the full <code>chrome-extension://.../</code> URL. The popup will normalize and save it.
      </div>
    </div>
  </details>

  <div id="logArea" class="log-area">🚀 Ready</div>

  <div class="footer">
    <span id="extensionId">v0.1.0</span>
    <a id="openOptionsLink">Open Panel</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
